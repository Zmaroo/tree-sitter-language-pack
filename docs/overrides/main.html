{% extends "base.html" %}

{% block extrahead %}
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ config.site_name }}{% if page and page.title and not page.is_homepage %} - {{ page.title | striptags }}{% endif %}" />
  <meta property="og:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}Pre-compiled tree-sitter parsers for 170+ languages with code intelligence and polyglot bindings.{% endif %}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ config.site_name }}{% if page and page.title and not page.is_homepage %} - {{ page.title | striptags }}{% endif %}" />
  <meta name="twitter:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}Pre-compiled tree-sitter parsers for 170+ languages with code intelligence and polyglot bindings.{% endif %}" />
{% endblock %}
