language = "C"
include_guard = "TS_PACK_H"
autogen_warning = "/* This file is auto-generated by cbindgen. Do not edit manually. */"
no_includes = true
sys_includes = ["stddef.h", "stdbool.h", "stdint.h"]
after_includes = "/* Forward declaration for tree-sitter's TSLanguage type */\ntypedef struct TSLanguage TSLanguage;"

[defines]

[export]
include = ["TsPackRegistry", "TsPackTree"]
prefix = ""

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"
