version: "3"

tasks:
  build:ffi:
    desc: Build FFI shared library for Java
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build -p ts-pack-ffi --release

  test:
    desc: Run Java tests (requires FFI built first)
    deps: [build:ffi]
    dir: crates/ts-pack-java
    env:
      TSPACK_LIB_PATH: "{{.PROJECT_ROOT}}/target/release/libts_pack_ffi.{{if eq OS \"darwin\"}}dylib{{else if eq OS \"windows\"}}dll{{else}}so{{end}}"
    cmds:
      - mvn test

  format:
    desc: Format Java code
    dir: crates/ts-pack-java
    cmds:
      - mvn com.spotify.fmt:fmt-maven-plugin:format || true

  lint:
    desc: Lint Java code
    dir: crates/ts-pack-java
    cmds:
      - mvn com.spotify.fmt:fmt-maven-plugin:check || true

  e2e:generate:
    desc: Generate Java E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo run -p e2e-generator -- generate --lang java

  e2e:test:
    desc: Run Java E2E tests
    deps: [build:ffi]
    dir: e2e/java
    env:
      TSPACK_LIB_PATH: "{{.PROJECT_ROOT}}/target/release/libts_pack_ffi.{{if eq OS \"darwin\"}}dylib{{else if eq OS \"windows\"}}dll{{else}}so{{end}}"
    cmds:
      - mvn test
