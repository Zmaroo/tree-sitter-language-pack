{% extends "base.html" %}

{% block extrahead %}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8G4NQW55PF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-8G4NQW55PF');
    gtag('config', 'AW-17853694443');
  </script>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ config.site_name }}{% if page and page.title and not page.is_homepage %} - {{ page.title | striptags }}{% endif %}" />
  <meta property="og:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}{{ config.site_description }}{% endif %}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  <meta property="og:image" content="{{ config.site_url }}assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ config.site_name }}{% if page and page.title and not page.is_homepage %} - {{ page.title | striptags }}{% endif %}" />
  <meta name="twitter:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}{{ config.site_description }}{% endif %}" />
  <meta name="twitter:image" content="{{ config.site_url }}assets/og-image.png" />

  <meta name="robots" content="index, follow" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareSourceCode",
    "name": "{{ config.site_name }}",
    "description": "{{ config.site_description }}",
    "url": "{{ config.repo_url }}",
    "codeRepository": "{{ config.repo_url }}",
    "programmingLanguage": ["Rust", "Python", "TypeScript", "Go", "Java", "C#", "Ruby", "Elixir", "PHP", "WebAssembly", "C"],
    "runtimePlatform": ["Linux", "macOS", "Windows"],
    "license": "https://opensource.org/licenses/MIT",
    "author": {
      "@type": "Organization",
      "name": "kreuzberg.dev",
      "url": "https://kreuzberg.dev"
    },
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": ["Linux", "macOS", "Windows"],
    "keywords": "tree-sitter, parser, code intelligence, syntax tree, code chunking, LLM, polyglot, 248 languages"
  }
  </script>
{% endblock %}
